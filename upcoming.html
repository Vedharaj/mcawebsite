<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Drives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white p-6">
    <div class="space-y-4">
        <!-- Upcoming Card 1 -->
        <div class="flex items-center justify-between p-6 border border-slate-200 rounded-lg bg-white hover:shadow-lg hover:border-blue-200 transition-all group">
            <div class="flex items-center gap-5">
                <div class="bg-slate-50 w-14 h-14 rounded-lg flex items-center justify-center text-blue-900 font-black text-lg border border-slate-100 group-hover:bg-blue-50">INF</div>
                <div>
                    <h4 class="font-bold text-slate-800">Infosys - HackWithInfy 2024</h4>
                    <p class="text-xs text-slate-500 mt-1">Expected: 05 Nov 2024 • Eligibility: 6.5 CGPA & No Standing Arrears</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">Java</span>
                        <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">Python</span>
                        <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">SQL</span>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <button class="bg-white text-[#004AAD] text-xs font-bold border-2 border-[#004AAD] px-6 py-2 rounded-full hover:bg-[#004AAD] hover:text-white transition-colors">
                    <i class="far fa-bell mr-2"></i>NOTIFY ME
                </button>
            </div>
        </div>

        <!-- Upcoming Card 2 -->
        <div class="flex items-center justify-between p-6 border border-slate-200 rounded-lg bg-white hover:shadow-lg hover:border-blue-200 transition-all group">
            <div class="flex items-center gap-5">
                <div class="bg-slate-50 w-14 h-14 rounded-lg flex items-center justify-center text-blue-900 font-black text-lg border border-slate-100 group-hover:bg-blue-50">ACC</div>
                <div>
                    <h4 class="font-bold text-slate-800">Accenture - Advanced ASE Role</h4>
                    <p class="text-xs text-slate-500 mt-1">Expected: 12 Nov 2024 • Eligibility: MCA & M.Sc IT Only</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">Cloud Computing</span>
                        <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase">Full Stack</span>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <button class="bg-white text-[#004AAD] text-xs font-bold border-2 border-[#004AAD] px-6 py-2 rounded-full hover:bg-[#004AAD] hover:text-white transition-colors">
                    <i class="far fa-bell mr-2"></i>NOTIFY ME
                </button>
            </div>
        </div>
    </div>
</body>
</html>
