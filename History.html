<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruitment History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white p-6">
    <div class="border border-slate-100 rounded-lg overflow-hidden shadow-sm">
        <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 text-slate-500 font-bold border-b">
                <tr>
                    <th class="px-6 py-4">S.No</th>
                    <th class="px-6 py-4">Company Name</th>
                    <th class="px-6 py-4">Role / Designation</th>
                    <th class="px-6 py-4">Applied Date</th>
                    <th class="px-6 py-4">Status</th>
                </tr>
            </thead>
            <tbody class="text-slate-700">
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="px-6 py-4">1</td>
                    <td class="px-6 py-4 font-bold text-blue-900">TCS (Tata Consultancy Services)</td>
                    <td class="px-6 py-4">NQT - Ninja Developer</td>
                    <td class="px-6 py-4 text-xs">15 Sept 2024</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold uppercase">Applied</span>
                    </td>
                </tr>
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                    <td class="px-6 py-4">2</td>
                    <td class="px-6 py-4 font-bold text-blue-900">Cognizant (CTS)</td>
                    <td class="px-6 py-4">Programmer Analyst Trainee</td>
                    <td class="px-6 py-4 text-xs">02 Aug 2024</td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold uppercase">Not Shortlisted</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
