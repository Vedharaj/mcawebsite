<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongoing Drives</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white p-6">
    <div class="grid grid-cols-1 gap-6">
        <!-- Live Drive Card -->
        <div class="bg-white border-2 border-blue-50 rounded-xl p-6 shadow-sm relative overflow-hidden">
            <div class="absolute right-0 top-0 bg-[#004AAD] text-white px-4 py-1 text-[10px] font-bold">LIVE DRIVE</div>
            <div class="flex items-start gap-5">
                <div class="w-16 h-16 bg-slate-100 rounded-lg flex items-center justify-center text-3xl font-black text-slate-400">Z</div>
                <div class="flex-grow">
                    <div class="flex items-center gap-2">
                        <h3 class="text-xl font-bold text-slate-800">Zoho Corporation</h3>
                        <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded font-bold uppercase">Open</span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1">Software Developer Trainee (2024-25 Batch)</p>
                    <div class="flex items-center gap-6 text-xs text-slate-400 font-medium mt-4">
                        <span><i class="far fa-calendar-alt mr-1"></i> Deadline: 28 Oct 2024</span>
                        <span><i class="fas fa-map-marker-alt mr-1"></i> Main Campus, Hall A</span>
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <button class="bg-[#004AAD] text-white px-6 py-2 rounded font-bold text-sm hover:bg-blue-800 transition">
                        RESUME APPLICATION
                    </button>
                    <button class="text-slate-400 text-xs font-bold hover:text-slate-600">VIEW JOB DESCRIPTION</button>
                </div>
            </div>
            
            <div class="mt-6 pt-6 border-t border-slate-50">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wide">
                    <span>Application Status: Step 2 of 4 (Technical Assessment)</span>
                    <span>50% Complete</span>
                </div>
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full w-1/2 transition-all duration-1000"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
